name: Release macOS

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string
      deployment-target:
        description: Minimum supported macOS version for the universal binary
        required: false
        type: string
        default: "11.0"
      artifact-retention-days:
        description: Number of days to retain uploaded workflow artifacts
        required: false
        type: number
        default: 30

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  build:
    name: Build signed universal macOS binary
    runs-on: macos-latest
    environment: release
    env:
      BINARY_IDENTIFIER: com.techouse.patholog
      MACOSX_DEPLOYMENT_TARGET: ${{ inputs['deployment-target'] }}

    steps:
      - uses: actions/checkout@v6

      - name: Configure signing paths
        run: |
          set -euo pipefail
          echo "CERTIFICATE_PATH=${RUNNER_TEMP}/build_certificate.p12" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=${RUNNER_TEMP}/app-signing.keychain-db" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build Apple Silicon release binary
        run: cargo build --release --locked --target aarch64-apple-darwin

      - name: Build Intel release binary
        run: cargo build --release --locked --target x86_64-apple-darwin

      - name: Create universal binary
        run: |
          set -euo pipefail
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/patholog \
            target/x86_64-apple-darwin/release/patholog \
            -output dist/patholog
          chmod 755 dist/patholog

      - name: Verify universal binary
        run: |
          set -euo pipefail
          lipo -info dist/patholog
          lipo -info dist/patholog | grep -q 'arm64'
          lipo -info dist/patholog | grep -q 'x86_64'
          file dist/patholog
          ./dist/patholog --version

      - name: Generate shell completions
        run: |
          set -euo pipefail
          mkdir -p dist/completions
          dist/patholog completions bash > dist/completions/patholog.bash
          dist/patholog completions zsh > dist/completions/_patholog
          dist/patholog completions fish > dist/completions/patholog.fish
          dist/patholog completions pwsh > dist/completions/patholog.ps1

      - name: Install Apple certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -P "$P12_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

      - name: Sign universal binary
        env:
          BUILD_CERTIFICATE_SHA1: ${{ secrets.BUILD_CERTIFICATE_SHA1 }}
        run: |
          set -euo pipefail
          codesign \
            --force \
            --sign "$BUILD_CERTIFICATE_SHA1" \
            --identifier "$BINARY_IDENTIFIER" \
            --options runtime \
            --timestamp \
            dist/patholog

      - name: Verify signature
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -euo pipefail
          codesign --verify --strict --verbose=2 dist/patholog
          codesign -dv dist/patholog
          signed_team_id="$(codesign -dv dist/patholog 2>&1 | awk -F= '/TeamIdentifier/{print $2}')"
          if [[ "$signed_team_id" != "$TEAM_ID" ]]; then
            echo "The TeamIdentifier in the signature does not match the expected TeamIdentifier."
            exit 1
          fi

      - name: Package release archive
        run: |
          set -euo pipefail
          package="patholog-${{ inputs.version }}-universal-apple-darwin"
          mkdir -p "dist/${package}"
          cp dist/patholog "dist/${package}/patholog"
          cp -R dist/completions "dist/${package}/completions"
          cp README.md LICENSE THIRD-PARTY-LICENSES.md "dist/${package}/"
          codesign --verify --strict --verbose=2 "dist/${package}/patholog"
          ditto -c -k --keepParent "dist/${package}" "dist/${package}.zip"

      - name: Create notarytool keychain profile
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          NOTARYTOOL_KEYCHAIN_PROFILE: ${{ vars.NOTARYTOOL_KEYCHAIN_PROFILE }}
          NOTARYTOOL_PASSWORD: ${{ secrets.NOTARYTOOL_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "$NOTARYTOOL_KEYCHAIN_PROFILE" \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$NOTARYTOOL_PASSWORD"

      - name: Notarize release archive
        env:
          NOTARYTOOL_KEYCHAIN_PROFILE: ${{ vars.NOTARYTOOL_KEYCHAIN_PROFILE }}
        run: |
          set -euo pipefail
          xcrun notarytool submit "dist/patholog-${{ inputs.version }}-universal-apple-darwin.zip" \
            --keychain-profile "$NOTARYTOOL_KEYCHAIN_PROFILE" \
            --wait

      - name: Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: patholog-macos-universal
          path: dist/patholog-${{ inputs.version }}-universal-apple-darwin.zip
          if-no-files-found: error
          retention-days: ${{ inputs['artifact-retention-days'] }}

      - name: Clean up signing keychain
        if: ${{ always() }}
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
          rm -f "$CERTIFICATE_PATH"
