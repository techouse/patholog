name: Release crates.io

on:
  workflow_call:
    inputs:
      version:
        description: Release version without the leading v
        required: true
        type: string

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  publish:
    name: Publish crate
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Verify Cargo.toml version matches release version
        run: |
          set -euo pipefail
          cargo_version="$(awk -F '"' '/^version = / { print $2; exit }' Cargo.toml)"
          release_version="${{ inputs.version }}"
          if [[ "$cargo_version" != "$release_version" ]]; then
            echo "Cargo.toml version ${cargo_version} does not match release version ${release_version}."
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked --token "${CARGO_REGISTRY_TOKEN}"
