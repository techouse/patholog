name: Test

on:
  push:
    branches:
      - master
      - main
  pull_request:
    branches:
      - master
      - main
  workflow_call:

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  msrv-meta:
    name: Read MSRV
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.read-msrv.outputs.msrv }}

    steps:
      - uses: actions/checkout@v6

      - id: read-msrv
        name: Read rust-version from Cargo.toml
        run: |
          set -euo pipefail
          msrv="$(
            awk -F'"' '
              /^[[:space:]]*\[package\][[:space:]]*$/ { in_package = 1; next }
              /^[[:space:]]*\[/ { in_package = 0 }
              in_package && /^[[:space:]]*rust-version[[:space:]]*=/ { print $2; exit }
            ' Cargo.toml
          )"
          if [[ -z "$msrv" ]]; then
            echo "failed to read package.rust-version from Cargo.toml" >&2
            exit 1
          fi
          echo "msrv=${msrv}" >> "$GITHUB_OUTPUT"

  stable:
    name: Stable test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      CODACY_PROJECT_TOKEN: ${{ secrets.CODACY_PROJECT_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest' && (env.CODECOV_TOKEN != '' || env.CODACY_PROJECT_TOKEN != '')
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Test with coverage
        if: matrix.os == 'ubuntu-latest' && (env.CODECOV_TOKEN != '' || env.CODACY_PROJECT_TOKEN != '')
        run: cargo llvm-cov --all-features --locked --lib --tests --lcov --output-path lcov.info

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: techouse/patholog.rs
          files: lcov.info
          fail_ci_if_error: true

      - name: Upload coverage to Codacy
        if: matrix.os == 'ubuntu-latest' && env.CODACY_PROJECT_TOKEN != '' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@v1
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: lcov.info

      - name: Test
        if: matrix.os != 'ubuntu-latest' || (env.CODECOV_TOKEN == '' && env.CODACY_PROJECT_TOKEN == '')
        run: cargo test --all-targets --all-features --locked

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-about

      - uses: Swatinem/rust-cache@v2

      - name: Format check
        run: make fmt-check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Fuzz harness clippy
        run: cargo clippy --manifest-path fuzz/Cargo.toml --all-targets --locked -- -D warnings

      - name: Doc tests
        run: cargo test --doc --locked

      - name: Public docs
        env:
          RUSTDOCFLAGS: -D warnings --cfg docsrs
        run: cargo doc --locked --no-deps --lib

      - name: Missing public docs
        env:
          RUSTFLAGS: -D missing_docs
        run: cargo check --lib --all-features --locked

      - name: Third-party license notices
        run: make third-party-licenses-check

  msrv:
    name: MSRV (${{ needs.msrv-meta.outputs.msrv }})
    needs: msrv-meta
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: ${{ needs.msrv-meta.outputs.msrv }}

      - uses: Swatinem/rust-cache@v2

      - name: Test on MSRV
        run: cargo test --locked

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Package check
        run: make package-check
